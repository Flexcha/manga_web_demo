# Database Configuration
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/manga_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Let Hibernate detect the dialect automatically for better compatibility
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Active Profile (set to 'prod' in production to disable demo data)
spring.profiles.active=${SPRING_PROFILE:dev}

# Server Port
server.port=8080

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
